<div class="accordion" [attr.id]="'accordion-artilheiro-'+hashBolao">
    <div class="accordion-item">
        <h2 class="accordion-header" [id]="'heading-artilheiro-'+hashBolao">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                [attr.data-bs-target]="'#collapse-artilheiro-'+hashBolao" aria-expanded="false"
                [attr.aria-controls]="'collapse-artilheiro-'+hashBolao">
                Artilheiro
            </button>
        </h2>
        <div [id]="'collapse-artilheiro-'+hashBolao" class="accordion-collapse collapse"
            [attr.aria-labelledby]="'heading-artilheiro-'+hashBolao" [attr.data-bs-parent]="'#accordion-artilheiro-'+hashBolao">
            <div class="accordion-body">
                <div class="container my-2">

                    <!-- Artilheiro Geral -->
                    <div class="row mb-4" *ngIf="regras.includes('Acertou artilheiro')">
                        <label style="font-weight: 600; color: #495057;" class="form-label fw-semibold">Artilheiro</label>
                        <ng-select
                            [items]="jogadores$ | async"
                            bindLabel="nome"
                            bindValue="id"
                            [typeahead]="inputBusca$"
                            placeholder="Digite para buscar..."
                            [(ngModel)]="jogadorSelecionado">
                        </ng-select>

                        <div class="d-flex justify-content-center mt-3">
                            <button class="btn btn-success w-100 botao-salvar" (click)="salvarPalpite()">
                                Salvar
                            </button>
                        </div>
                    </div>

                    <!-- Artilheiro do Brasil -->
                    <div class="row" *ngIf="regras.includes('Acertou artilheiro do Brasil')">
                        <label style="font-weight: 600; color: #495057;" class="form-label fw-semibold">Artilheiro do Brasil</label>
                        <ng-select
                            [items]="jogadoresBrasil$ | async"
                            bindLabel="nome"
                            bindValue="id"
                            [typeahead]="inputBuscaBrasil$"
                            placeholder="Digite para buscar..."
                            [(ngModel)]="jogadorBrasilSelecionado">
                        </ng-select>

                        <div class="d-flex justify-content-center mt-3">
                            <button class="btn btn-success w-100 botao-salvar" (click)="salvarPalpiteBrasil()">
                                Salvar
                            </button>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>
