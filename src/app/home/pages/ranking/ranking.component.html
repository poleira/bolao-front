<app-cabecalho [mostrarBotaoVoltar]="true"></app-cabecalho>

<div class="container mt-4">
  <div class="row mb-3">
    <div class="col">
      <h4 class="mb-1">Ranking do bolão</h4>
      <p class="text-muted">Acompanhe a pontuação dos participantes.</p>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th scope="col" class="text-center">Posição</th>
              <th scope="col">Jogador</th>
              <th scope="col" class="text-center">Pontuação</th>
              <th scope="col" class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let jogador of paginaAtual; let idx = index">
              <td class="text-center fw-semibold">{{ (currentPage - 1) * pageSize + idx + 1 }}</td>
              <td>{{ jogador.usuario }}</td>
              <td class="text-center">
                <span class="badge bg-success bg-opacity-75 text-dark px-3 py-2">{{ jogador.pontuacao }}</span>
              </td>
              <td class="text-center">
                <ng-container *ngIf="usuarioEhAdmin; else apenasVisualizar">
                  <div class="dropdown">
                    <button class="btn btn-outline-success btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                      <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                      <li>
                        <button class="dropdown-item" (click)="navegarPalpites(jogador.usuario)">
                          <i class="fa-solid fa-eye me-2"></i>Ver palpites
                        </button>
                      </li>
                      <ng-container *ngIf="jogador.usuario !== nomeUsuarioLogado">
                        <li><hr class="dropdown-divider"></li>
                        <li>
                          <button class="dropdown-item text-danger" (click)="excluirJogador(jogador)">
                            <i class="fa-solid fa-user-minus me-2"></i>Remover do bolão
                          </button>
                        </li>
                      </ng-container>
                    </ul>
                  </div>
                </ng-container>
                <ng-template #apenasVisualizar>
                  <button type="button" class="btn btn-outline-success btn-sm" (click)="navegarPalpites(jogador.usuario)">
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </ng-template>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col d-flex justify-content-between align-items-center mx-1">
      <button type="button" class="btn btn-link text-success text-decoration-none px-0" [disabled]="currentPage === 1" (click)="alterarPagina(-1)">
        <span>Anterior</span>
      </button>
      <span class="text-muted">Página {{ currentPage }} de {{ totalPages }}</span>
      <button type="button" class="btn btn-link text-success text-decoration-none px-0" [disabled]="currentPage === totalPages" (click)="alterarPagina(1)">
        <span>Próxima</span>
      </button>
    </div>
  </div>
</div>

<ngx-spinner name="carregando" bdColor="rgba(0, 0, 0, 0.8)" size="default" color="#fff" type="ball-spin"
    [fullScreen]="true">
    <p class="text-white p-0">Carregando</p>
</ngx-spinner>

<!-- Modal Visualizar Palpites -->
<div class="modal fade" [class.show]="modalAberto" [style.display]="modalAberto ? 'block' : 'none'" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
    <div class="modal-content">
      <app-visualizar-palpites-modal
        *ngIf="modalAberto"
        [nomeUsuario]="usuarioSelecionado"
        [hashBolao]="bolaoToken"
        (fecharModal)="fecharModal()"
      ></app-visualizar-palpites-modal>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="modalAberto" *ngIf="modalAberto"></div>
